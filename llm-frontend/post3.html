  <script>
    try {
      beforeBody();
    } catch (error) {
      console.error(error);
    }

    function beforeBody() {
      document.documentElement?.classList.remove('no-js');
      const browserPref = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      let userSelected = 'none';
      if (localStorage.setting_kae === '-1') userSelected = 'light';
      if (localStorage.setting_kae === 'd') userSelected = 'dark';
      switch (userSelected) {
        case 'none': {
          if (browserPref === 'dark') {
            document.documentElement.classList.add('set-theme--dark');
          }
          break;
        }
        case 'light': {
          if (browserPref === 'dark') {
            // prevent the flash of dark theme
            document.documentElement.classList.remove('no-theme');
            document.documentElement.classList.remove('set-theme--light');
          }
          break;
        }
        case 'dark': {
          document.documentElement.classList.add('set-theme--dark');
          break;
        }
      }
    }

  </script>
